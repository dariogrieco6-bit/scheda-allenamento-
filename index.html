<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Scheda Allenamento</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
header{background:#1D9E75;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-left h1{font-size:17px;font-weight:600;white-space:nowrap}
.hdr-left span{font-size:12px;opacity:.8}
.hdr-right{display:flex;gap:8px;flex-shrink:0}
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-white{background:#fff;color:#1D9E75}
.btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.55)}
main{max-width:780px;margin:0 auto;padding:20px 16px 40px}
.panel{background:#fff;border-radius:14px;border:1px solid #e2e2e0;padding:16px;margin-bottom:16px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.field label{font-size:11px;font-weight:700;color:#888;letter-spacing:.4px;display:block;margin-bottom:5px}
select{width:100%;border:1px solid #ddd;border-radius:8px;padding:9px 11px;font-size:14px;background:#fafafa;color:#1a1a1a}
select:focus{outline:2px solid #1D9E75;border-color:transparent}
.gen-btn{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:9px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}
.meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.data-lbl{font-size:12px;color:#aaa}
.tema-badge{background:#E1F5EE;color:#085041;border-radius:999px;padding:4px 13px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.filo{font-size:14px;color:#555;border-left:3px solid #1D9E75;padding-left:11px;line-height:1.55;margin-bottom:18px;font-style:italic}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cat-pill{font-size:11px;font-weight:800;border-radius:999px;padding:3px 13px;white-space:nowrap}
.u11p{background:#E6F1FB;color:#0C447C}
.u12p{background:#FAECE7;color:#712B13}
.cat-hdr hr{flex:1;border:none;border-top:1px solid #eee}
.yc-link{font-size:11px;color:#1D9E75;text-decoration:none;white-space:nowrap}
.cat-section{margin-bottom:22px}
.ecard{background:#fff;border:1px solid #e8e8e6;border-radius:12px;padding:14px 16px;margin-bottom:8px;border-left:4px solid #ccc}
.ecard.tecnica{border-left-color:#378ADD}
.ecard.tattica{border-left-color:#EF9F27}
.ecard.atletica{border-left-color:#E24B4A}
.ecard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.tipo-tag{font-size:10px;font-weight:800;border-radius:4px;padding:2px 8px;letter-spacing:.5px;flex-shrink:0}
.tipo-tag.tecnica{background:#E6F1FB;color:#185FA5}
.tipo-tag.tattica{background:#FAEEDA;color:#854F0B}
.tipo-tag.atletica{background:#FCEBEB;color:#A32D2D}
.ecard-nome{font-size:15px;font-weight:600;color:#1a1a1a}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.pill{font-size:11px;background:#f4f4f2;color:#666;border-radius:999px;padding:2px 10px}
.edesc{font-size:13px;color:#555;line-height:1.65;margin-bottom:8px}
.ob{font-size:12px;color:#085041;background:#E1F5EE;border-left:2px solid #1D9E75;padding:6px 10px;border-radius:0 7px 7px 0}
.tot-min{font-size:11px;color:#bbb;text-align:right;margin-top:4px}
.empty{text-align:center;padding:50px 20px;color:#aaa}
.empty-icon{font-size:52px;margin-bottom:12px}
.empty p{font-size:15px;line-height:1.6}
.sk{border-radius:10px;background:linear-gradient(90deg,#efefed 25%,#e6e6e4 50%,#efefed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media print{
  header,.panel{display:none!important}
  body{background:#fff}
  main{padding:0;max-width:100%}
  .ecard{break-inside:avoid;border:1px solid #ddd}
  .cat-section{break-inside:avoid}
  #phdr{display:block!important}
}
#phdr{display:none;text-align:center;padding-bottom:12px;margin-bottom:16px;border-bottom:2px solid #1D9E75}
#phdr h2{font-size:20px;color:#1D9E75}
#phdr p{font-size:12px;color:#888;margin-top:4px}
</style>
</head>
<body>
<header>
  <div class="hdr-left">
    <span style="font-size:22px">⚽</span>
    <h1>Scheda Allenamento</h1>
    <span>U11 · U12 · Tecnica · Tattica · Atletica</span>
  </div>
  <div class="hdr-right">
    <button class="btn btn-outline" onclick="window.print()">🖨️ PDF</button>
    <button class="btn btn-white" id="hbtn" onclick="genera()">⚽ Genera</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="fields">
      <div class="field">
        <label>TEMA DEL GIORNO</label>
        <select id="tema">
          <option value="auto">🎲 Automatico</option>
          <option value="possesso palla">Possesso palla</option>
          <option value="finalizzazione">Finalizzazione</option>
          <option value="transizione">Transizione</option>
          <option value="pressing e recupero palla">Pressing</option>
          <option value="gioco in ampiezza">Gioco ampiezza</option>
          <option value="passaggio e smarcamento">Passaggio</option>
          <option value="conduzione e dribbling">Dribbling</option>
          <option value="gioco sulle fasce">Gioco fasce</option>
        </select>
      </div>
      <div class="field">
        <label>DURATA SEDUTA</label>
        <select id="durata">
          <option value="60">60 minuti</option>
          <option value="75" selected>75 minuti</option>
          <option value="90">90 minuti</option>
        </select>
      </div>
    </div>
    <button class="gen-btn" id="gbtn" onclick="genera()">⚽ Genera scheda di oggi</button>
  </div>
  <div id="out">
    <div class="empty">
      <div class="empty-icon">⚽</div>
      <p>Premi <strong>"Genera scheda di oggi"</strong><br>per creare la seduta con 6 esercizi</p>
    </div>
  </div>
</main>

<script>
const API_KEY="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";
const TEMI=["possesso palla","finalizzazione","transizione","pressing e recupero palla","gioco in ampiezza","passaggio e smarcamento","conduzione e dribbling","gioco sulle fasce"];
function temaAuto(){const d=new Date();return TEMI[(d.getDate()+d.getMonth()*31)%TEMI.length]}
function oggi(){return new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}

async function genera(){
  const hbtn=document.getElementById('hbtn');
  const gbtn=document.getElementById('gbtn');
  const out=document.getElementById('out');
  const tema=document.getElementById('tema').value==='auto'?temaAuto():document.getElementById('tema').value;
  const durata=document.getElementById('durata').value;
  [hbtn,gbtn].forEach(b=>{b.disabled=true});
  hbtn.innerHTML='<span class="spin"></span>';
  gbtn.innerHTML='<span class="spin"></span> Generando...';
  out.innerHTML=`<div style="display:grid;gap:8px">${[...Array(6)].map(()=>'<div class="sk" style="height:100px"></div>').join('')}</div>`;
  const prompt=`Sei un preparatore di calcio giovanile italiano. Genera una scheda ispirata a YouCoach.\nTema: "${tema}" — Durata totale: ${durata} minuti\nPer U11 (Pulcini) e U12 (Esordienti) crea 3 esercizi ciascuno: tecnica, tattica, atletica.\nTutti con lo stesso filo conduttore. Durata totale entro ${durata} min.\nRispondi SOLO con JSON senza backtick:\n{"tema":"...","filo_conduttore":"max 20 parole","u11":[{"tipo":"tecnica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."},{"tipo":"tattica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."},{"tipo":"atletica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."}],"u12":[{"tipo":"tecnica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."},{"tipo":"tattica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."},{"tipo":"atletica","nome":"...","durata_min":N,"giocatori":"...","spazio":"...","descrizione":"3-4 frasi","obiettivo":"..."}]}`;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,messages:[{role:"user",content:prompt}]})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'Errore '+r.status)}
    const d=await r.json();
    const txt=d.content.map(b=>b.text||'').join('');
    const j=JSON.parse(txt.replace(/```json|```/g,'').trim());
    render(j,durata);
  }catch(e){
    out.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><p><strong>Errore:</strong> ${e.message}</p></div>`;
  }
  [hbtn,gbtn].forEach(b=>{b.disabled=false});
  hbtn.innerHTML='⚽ Genera';
  gbtn.innerHTML='⚽ Genera scheda di oggi';
}

const TL={tecnica:'TECNICA',tattica:'TATTICA',atletica:'ATLETICA'};
const TE={tecnica:'👟',tattica:'🧠',atletica:'💪'};

function catHtml(cat,ex){
  const pc=cat==='u11'?'u11p':'u12p';
  const lb=cat==='u11'?'U11 · Pulcini':'U12 · Esordienti';
  const lk=cat==='u11'?'https://www.youcoach.it/figc/situazioni-di-gioco-3-contro-3-u10u11':'https://www.youcoach.it/figc/situazioni-di-gioco-5-contro-5-u12u13';
  const tot=ex.reduce((s,e)=>s+e.durata_min,0);
  return `<div class="cat-section">
    <div class="cat-hdr"><span class="cat-pill ${pc}">${lb}</span><hr><a class="yc-link" href="${lk}" target="_blank">YouCoach ↗</a></div>
    ${ex.map(e=>`<div class="ecard ${e.tipo}">
      <div class="ecard-top"><span class="tipo-tag ${e.tipo}">${TE[e.tipo]} ${TL[e.tipo]}</span><span class="ecard-nome">${e.nome}</span></div>
      <div class="pills"><span class="pill">⏱ ${e.durata_min} min</span><span class="pill">👥 ${e.giocatori}</span><span class="pill">📐 ${e.spazio}</span></div>
      <p class="edesc">${e.descrizione}</p>
      <div class="ob"><strong>🎯 Obiettivo:</strong> ${e.obiettivo}</div>
    </div>`).join('')}
    <p class="tot-min">Totale ${cat.toUpperCase()}: ${tot} min</p>
  </div>`;
}

function render(j,durata){
  document.getElementById('out').innerHTML=`
    <div id="phdr"><h2>⚽ Scheda Allenamento — ${j.tema}</h2><p>${oggi()} · ${durata} min</p></div>
    <div class="meta"><span class="data-lbl">${oggi()}</span><span class="tema-badge">🎯 ${j.tema}</span></div>
    <p class="filo">🔗 ${j.filo_conduttore}</p>
    ${catHtml('u11',j.u11)}${catHtml('u12',j.u12)}`;
}
</script>
</body>
</html>
